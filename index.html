<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damath - Ultra Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --board-dark: #064e3b; --board-light: #f1f5f9; }
        .game-grid { display: grid; grid-template-columns: 240px 1fr 240px; gap: 24px; width: 100%; max-width: 1200px; }
        @media (max-width: 1024px) { .game-grid { grid-template-columns: 1fr; } }
        
        /* Fixed Grid for Perfect Square */
        .checker-board { 
            display: grid; 
            grid-template-columns: repeat(8, minmax(0, 1fr)); 
            grid-template-rows: repeat(8, minmax(0, 1fr)); 
            aspect-ratio: 1/1; 
            width: 100%;
            max-width: 65vh; 
            margin: 0 auto;
            border: 8px solid #1e293b; 
            background: #1e293b; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .square { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; height: 100%; }
        .square.dark { background-color: var(--board-dark); }
        .square.light { background-color: var(--board-light); }
        
        /* Piece & Operator Rotation fixes */
        .piece { 
            width: 85%; height: 85%; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.2s ease; font-weight: 900; color: white; 
            border: 3px solid rgba(255,255,255,0.2); z-index: 10;
            transform: rotate(0deg) scale(1); 
        }
        .piece.selected { transform: rotate(0deg) scale(1.15); border-color: #fbbf24; box-shadow: 0 0 20px #fbbf24; z-index: 50; }
        
        .piece.blue { background: radial-gradient(circle at 30% 30%, #3b82f6, #1e3a8a); }
        .piece.red { background: radial-gradient(circle at 30% 30%, #ef4444, #7f1d1d); }
        
        .operator { 
            position: absolute; font-size: clamp(1.2rem, 3.5vw, 2rem); font-weight: 900; 
            color: rgba(30, 41, 59, 0.3); text-shadow: 1px 1px 0px rgba(255,255,255,0.4); 
            pointer-events: none; z-index: 5;
            transform: rotate(0deg); 
        }

        /* Rotated Board Logic for Red Player */
        .board-rotated { transform: rotate(180deg); }
        .board-rotated .piece { transform: rotate(180deg) scale(1); }
        .board-rotated .piece.selected { transform: rotate(180deg) scale(1.15); }
        .board-rotated .operator { transform: rotate(180deg); }

        .valid-move::after { content: ''; width: 25%; height: 25%; background: #22c55e; border-radius: 50%; opacity: 0.8; box-shadow: 0 0 10px #22c55e; }
        .active-turn { outline: 4px solid #fbbf24; box-shadow: 0 0 20px rgba(251,191,36,0.4); }
        
        .history-list { height: 180px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #334155 transparent; }
        .history-item { font-family: monospace; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4 font-sans overflow-x-hidden">

    <!-- Emergency Recovery UI -->
    <div id="lobby" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl w-full max-w-md text-center">
            <h1 class="text-4xl font-black mb-2 italic">DA<span class="text-blue-500">MATH</span></h1>
            <p class="text-slate-400 text-sm mb-8">Multiplayer Battle</p>
            
            <div id="connection-status" class="mb-6">
                <div class="animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-blue-400 font-bold">Synchronizing with Database...</p>
                <p id="retry-hint" class="text-[10px] text-slate-600 mt-4 hidden">Connection taking longer than usual...</p>
            </div>

            <div id="lobby-ui" class="hidden space-y-4">
                <button id="btn-create" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-lg transition-all">Create Match</button>
                <div class="flex items-center gap-3">
                    <hr class="flex-1 border-slate-800"> <span class="text-xs text-slate-600 font-bold">OR</span> <hr class="flex-1 border-slate-800">
                </div>
                <input type="text" id="join-id" placeholder="Room ID (4 Digits)" class="w-full py-4 bg-slate-800 border border-slate-700 rounded-2xl text-center text-xl font-mono tracking-widest outline-none focus:border-blue-500 text-white uppercase">
                <button id="btn-join" class="w-full py-4 bg-slate-700 hover:bg-slate-600 rounded-2xl font-bold transition-all">Join Match</button>
            </div>
        </div>
    </div>

    <!-- EXIT MODAL -->
    <div id="exit-modal" class="fixed inset-0 bg-slate-950/80 z-[200] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-4 text-white">EXIT ROOM</h2>
            <p id="exit-prompt-text" class="text-slate-400 text-sm mb-8">Are you sure you want to leave?</p>
            <div class="space-y-3">
                <button id="btn-destroy-session" onclick="destroySession()" class="w-full py-3 bg-red-600 hover:bg-red-500 rounded-xl font-bold transition-all hidden shadow-lg shadow-red-900/20">Destroy Session Forever</button>
                <button onclick="leaveSession()" class="w-full py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition-all">Leave Temporarily</button>
                <button onclick="closeExitModal()" class="w-full py-3 bg-transparent text-slate-500 hover:text-white rounded-xl font-bold transition-all">Cancel</button>
            </div>
        </div>
    </div>

    <!-- WINNER MODAL -->
    <div id="winner-modal" class="fixed inset-0 bg-slate-950/90 z-[300] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-slate-900 p-10 rounded-3xl border-4 border-yellow-500 text-center max-w-md w-full shadow-2xl shadow-yellow-500/20 transform transition-all scale-100">
            <h2 class="text-5xl font-black italic mb-2 text-yellow-500">MATCH ENDED</h2>
            <div id="winner-name" class="text-4xl font-bold mb-8 text-white uppercase tracking-widest">BLUE WINS!</div>
            <button onclick="closeWinnerModal()" class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-black font-black uppercase rounded-2xl transition-colors">START NEXT MATCH</button>
        </div>
    </div>

    <!-- MAIN GAME UI -->
    <div id="game-ui" class="hidden w-full max-w-6xl">
        <div class="flex justify-between items-center mb-8">
            <div class="flex gap-2">
                <button onclick="promptExit()" class="text-xs font-bold text-slate-500 hover:text-white transition-colors px-4 py-2 bg-slate-800 rounded-lg">← EXIT ROOM</button>
                <button id="btn-new-game" onclick="promptNewGame()" class="text-xs font-bold text-green-400 hover:text-green-300 transition-colors px-4 py-2 bg-slate-800 rounded-lg hidden border border-green-900/50 shadow-[0_0_10px_rgba(74,222,128,0.1)]">↻ NEW MATCH</button>
                <button id="btn-global-undo" class="text-xs font-bold text-orange-400 hover:text-orange-300 transition-colors px-4 py-2 bg-slate-800 rounded-lg hidden">↶ REVERT LAST TURN</button>
            </div>
            <div class="text-center flex flex-col items-center">
                <h2 id="room-display" class="text-xs font-mono text-blue-400">ROOM: ----</h2>
                <h3 id="role-display" class="text-xs font-bold text-yellow-500 uppercase">PLAYER: ---</h3>
                <div id="opponent-status" class="mt-2 text-[9px] px-2 py-0.5 rounded uppercase font-bold tracking-widest hidden"></div>
            </div>
            <div class="w-[100px]"></div>
        </div>

        <div class="game-grid">
            <!-- Blue Stats -->
            <div id="panel-blue" style="order: 1;" class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700 flex flex-col h-full max-h-[600px] shadow-lg transition-all duration-500 relative">
                <p class="text-[10px] font-black text-blue-400 mb-2 uppercase tracking-widest text-center">Blue Score</p>
                <p id="score-blue" class="text-5xl font-mono font-black text-blue-100 text-center">0</p>
                <p id="match-wins-blue" class="text-[10px] font-bold text-yellow-500 mb-4 text-center uppercase tracking-widest">Wins: 0</p>
                <div class="text-[10px] font-bold uppercase text-slate-500 text-left px-2 border-b border-slate-700 pb-1 mb-2 mt-auto">Capture Log</div>
                <div id="log-blue" class="history-list text-blue-300"></div>
            </div>

            <!-- Board Section -->
            <div id="board-container" style="order: 2;" class="flex flex-col gap-6 items-center w-full min-w-0">
                <div id="board" class="checker-board rounded-xl shadow-2xl overflow-hidden ring-1 ring-white/10"></div>
                
                <div class="w-full bg-slate-800 p-4 rounded-2xl border border-slate-700 text-center shadow-inner max-w-[65vh]">
                    <p id="turn-status" class="font-bold text-lg text-blue-400 italic">Initializing...</p>
                    <div id="actions" class="mt-4 flex gap-2 hidden">
                        <button id="btn-undo" class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl text-xs font-bold transition-colors">UNDO MOVE</button>
                        <button id="btn-commit" class="flex-[2] bg-green-600 hover:bg-green-500 py-3 rounded-xl text-xs font-black transition-colors shadow-lg">END TURN</button>
                    </div>
                </div>
            </div>

            <!-- Red Stats -->
            <div id="panel-red" style="order: 3;" class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700 flex flex-col h-full max-h-[600px] shadow-lg transition-all duration-500 relative">
                <p class="text-[10px] font-black text-red-400 mb-2 uppercase tracking-widest text-center">Red Score</p>
                <p id="score-red" class="text-5xl font-mono font-black text-red-100 text-center">0</p>
                <p id="match-wins-red" class="text-[10px] font-bold text-yellow-500 mb-4 text-center uppercase tracking-widest">Wins: 0</p>
                <div class="text-[10px] font-bold uppercase text-slate-500 text-left px-2 border-b border-slate-700 pb-1 mb-2 mt-auto">Capture Log</div>
                <div id="log-red" class="history-list text-red-300"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State & Config Setup
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyCsauqSlcJ9lVf4dqy9YmWQAZRZ8DQrVBo",
                authDomain: "damath-ba689.firebaseapp.com",
                projectId: "damath-ba689",
                storageBucket: "damath-ba689.firebasestorage.app",
                messagingSenderId: "37396916011",
                appId: "1:37396916011:web:1ccbe20b5cbac860f3076e"
            };
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'damath-stable-v3';
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Initialization Error:", e);
        }

        let user = null;
        let roomId = null;
        let myRole = null;
        let gameState = null;
        let unsub = null;

        // Turn Management State
        let selected = null;
        let moves = [];
        let turnBoard = null; 
        let tempScore = 0;
        let tempLogs = [];
        let jumpChain = false;
        let isCommitting = false; 
        let inactivityTimer = null; 
        let lastSeenWinnerTime = null; // Tracks so winner modal doesn't show multiple times

        // Operators mapping perfectly to playable tiles (Even squares / r+c % 2 === 0)
        const boardOps = [
            ['×', null, '÷', null, '-', null, '+', null], 
            [null, '÷', null, '×', null, '+', null, '-'],
            ['-', null, '+', null, '×', null, '÷', null], 
            [null, '+', null, '-', null, '÷', null, '×'],
            ['×', null, '÷', null, '-', null, '+', null], 
            [null, '÷', null, '×', null, '+', null, '-'],
            ['-', null, '+', null, '×', null, '÷', null], 
            [null, '+', null, '-', null, '÷', null, '×']
        ];

        // UI Helpers
        const lobbyEl = document.getElementById('lobby');
        const lobbyUiEl = document.getElementById('lobby-ui');
        const connEl = document.getElementById('connection-status');
        const gameUiEl = document.getElementById('game-ui');

        const initAuth = async () => {
            if (!auth) {
                connEl.innerHTML = `<p class="text-red-400 font-bold mb-4">Firebase Config Missing</p>`;
                lobbyUiEl.classList.remove('hidden');
                return;
            }
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                connEl.innerHTML = `<p class="text-red-400 text-sm font-bold mb-4">Authentication failed. Check Firebase rules.</p>`;
                lobbyUiEl.classList.remove('hidden');
            }
        };

        if (auth) {
            onAuthStateChanged(auth, async (u) => {
                user = u;
                if (user) {
                    const savedRoom = localStorage.getItem('last_room');
                    if (savedRoom) {
                        try {
                            const snap = await getDoc(getGameRef(savedRoom));
                            if (snap.exists()) {
                                const data = snap.data();
                                let role = 'observer';
                                if (data.players.blue === user.uid) role = 'blue';
                                else if (data.players.red === user.uid) role = 'red';
                                
                                connEl.classList.add('hidden');
                                enterRoom(savedRoom, role);
                                return; 
                            } else {
                                localStorage.removeItem('last_room');
                            }
                        } catch (e) {
                            console.warn("Auto-rejoin failed:", e);
                        }
                    }

                    connEl.classList.add('hidden');
                    lobbyUiEl.classList.remove('hidden');
                }
            });
            initAuth();
        }

        setTimeout(() => {
            if (connEl && !connEl.classList.contains('hidden')) {
                document.getElementById('retry-hint').classList.remove('hidden');
            }
        }, 3000);

        const getGameRef = (id) => doc(db, 'games', id);

        window.createGame = async () => {
            if (!user) return alert("Not authenticated.");
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            const initialBoard = generateBoard();
            const data = {
                id, 
                board: JSON.stringify(initialBoard), 
                turn: 'blue', 
                scores: { blue: 0, red: 0 },
                matchWins: { blue: 0, red: 0 },
                history: { blue: [], red: [] },
                historyStack: "[]",
                players: { blue: user.uid, red: null },
                lastAction: Date.now(),
                liveState: null
            };
            try {
                await setDoc(getGameRef(id), data);
                localStorage.setItem('last_room', id);
                enterRoom(id, 'blue');
            } catch (e) {
                alert("Failed to create match. Missing database permissions.");
            }
        };

        window.joinGame = async () => {
            if (!user) return alert("Not authenticated.");
            const id = document.getElementById('join-id').value.trim();
            if (!id) return;
            try {
                const snap = await getDoc(getGameRef(id));
                if (!snap.exists()) {
                    alert("Room ID not found.");
                    return;
                }
                const data = snap.data();
                let role = 'observer';
                if (data.players.blue === user.uid) role = 'blue';
                else if (!data.players.red || data.players.red === user.uid) {
                    role = 'red';
                    await updateDoc(getGameRef(id), { 'players.red': user.uid });
                }
                
                localStorage.setItem('last_room', id); 
                enterRoom(id, role);
            } catch (e) {
                alert("Permission denied while trying to join room.");
            }
        };

        function enterRoom(id, role) {
            roomId = id;
            myRole = role;
            lobbyEl.classList.add('hidden');
            gameUiEl.classList.remove('hidden');
            document.getElementById('room-display').innerText = `ROOM: ${id}`;
            document.getElementById('role-display').innerText = `PLAYER: ${role.toUpperCase()}`;
            
            const boardEl = document.getElementById('board');
            const panelBlue = document.getElementById('panel-blue');
            const panelRed = document.getElementById('panel-red');
            
            if (role === 'red') {
                boardEl.classList.add('board-rotated');
                panelBlue.style.order = 3;
                panelRed.style.order = 1;
            } else {
                boardEl.classList.remove('board-rotated');
                panelBlue.style.order = 1;
                panelRed.style.order = 3;
            }
            
            let isFirstSnapshot = true; // Tracks the initial load to prevent modal spam on refresh
            
            if (unsub) unsub();
            unsub = onSnapshot(getGameRef(id), (snap) => {
                if (snap.exists()) {
                    gameState = snap.data();
                    gameState.board = JSON.parse(gameState.board);
                    
                    if (gameState.liveState) {
                        gameState.liveState = JSON.parse(gameState.liveState);
                    }
                    if (!gameState.history) gameState.history = { blue: [], red: [] };
                    if (!gameState.matchWins) gameState.matchWins = { blue: 0, red: 0 };
                    
                    if (gameState.historyStack && typeof gameState.historyStack === 'string') {
                        gameState.historyStack = JSON.parse(gameState.historyStack);
                    } else if (!gameState.historyStack) {
                        gameState.historyStack = [];
                    }

                    // Check for Winner Declaration securely
                    if (isFirstSnapshot) {
                        // Prevent winner modal from showing just because you refreshed the page
                        lastSeenWinnerTime = gameState.lastWinner?.time || null;
                        isFirstSnapshot = false;
                    } else if (gameState.lastWinner && gameState.lastWinner.time !== lastSeenWinnerTime) {
                        lastSeenWinnerTime = gameState.lastWinner.time;
                        // Fully reset local state to accept fresh board
                        turnBoard = null; selected = null; moves = []; tempScore = 0; tempLogs = []; jumpChain = false;
                        showWinnerModal(gameState.lastWinner.role);
                    }
                    
                    if (gameState.turn === myRole) {
                        isCommitting = false;
                    }

                    if (gameState.turn !== myRole) {
                        turnBoard = null; selected = null; moves = []; tempScore = 0; tempLogs = []; jumpChain = false;
                        
                        const btnCommit = document.getElementById('btn-commit');
                        const btnUndo = document.getElementById('btn-undo');
                        if (btnCommit) {
                            btnCommit.innerText = "END TURN";
                            btnCommit.classList.remove('opacity-50', 'pointer-events-none');
                        }
                        if (btnUndo) {
                            btnUndo.classList.remove('opacity-50', 'pointer-events-none');
                        }
                    }
                    
                    // --- 3 MINUTE INACTIVITY LOGIC ---
                    if (inactivityTimer) clearTimeout(inactivityTimer);
                    
                    const timeSinceLastAction = Date.now() - (gameState.lastAction || Date.now());
                    const timeLeft = (3 * 60 * 1000) - timeSinceLastAction; 
                    
                    if (timeLeft <= 0) {
                        alert("Session expired due to 3 minutes of inactivity.");
                        window.destroySession(true); 
                    } else {
                        inactivityTimer = setTimeout(() => {
                            alert("Session expired due to 3 minutes of inactivity.");
                            window.destroySession(true);
                        }, timeLeft);
                    }
                    
                    render();
                } else {
                    alert("Session has ended or expired.");
                    localStorage.removeItem('last_room'); 
                    location.reload();
                }
            }, (err) => console.error("Snapshot error:", err));
        }

        function generateBoard() {
            let b = Array(8).fill(null).map(() => Array(8).fill(null));
            const add = (r, c, col, val) => b[r][c] = { color: col, val, dama: false };
            
            // Red Pieces (Top Side)
            add(0, 0, 'red', 2); add(0, 2, 'red', -5); add(0, 4, 'red', 8); add(0, 6, 'red', -11);
            add(1, 1, 'red', -7); add(1, 3, 'red', 10); add(1, 5, 'red', -3); add(1, 7, 'red', 0);
            add(2, 0, 'red', 4); add(2, 2, 'red', -1); add(2, 4, 'red', 6); add(2, 6, 'red', -9);

            // Blue Pieces (Bottom Side)
            add(5, 1, 'blue', -9); add(5, 3, 'blue', 6); add(5, 5, 'blue', -1); add(5, 7, 'blue', 4);
            add(6, 0, 'blue', 0); add(6, 2, 'blue', -3); add(6, 4, 'blue', 10); add(6, 6, 'blue', -7);
            add(7, 1, 'blue', -11); add(7, 3, 'blue', 8); add(7, 5, 'blue', -5); add(7, 7, 'blue', 2);
            
            return b;
        }

        // REAL-TIME SYNC
        function pushLiveState() {
            if (!roomId || !user || isCommitting) return; 
            updateDoc(getGameRef(roomId), {
                liveState: JSON.stringify({
                    board: turnBoard,
                    selected: selected,
                    score: tempScore,
                    logs: tempLogs
                }),
                lastAction: Date.now() 
            }).catch(e => console.warn("Live sync error", e));
        }

        function render() {
            if (!gameState) return;
            
            const btnGlobalUndo = document.getElementById('btn-global-undo');
            const btnNewGame = document.getElementById('btn-new-game');
            
            if (btnGlobalUndo) {
                if (gameState.historyStack && gameState.historyStack.length > 0) {
                    btnGlobalUndo.classList.remove('hidden');
                } else {
                    btnGlobalUndo.classList.add('hidden');
                }
            }

            // Only the Host (Blue) sees the "New Match" button
            if (btnNewGame) {
                if (myRole === 'blue') {
                    btnNewGame.classList.remove('hidden');
                } else {
                    btnNewGame.classList.add('hidden');
                }
            }
            
            let displayBoard = gameState.board;
            let displaySelected = null;
            let displayScoreBlue = gameState.scores.blue;
            let displayScoreRed = gameState.scores.red;
            let displayLogsBlue = gameState.history.blue || [];
            let displayLogsRed = gameState.history.red || [];
            let isLiveOpponent = false;

            if (gameState.turn === myRole) {
                displayBoard = turnBoard || gameState.board;
                displaySelected = selected;
                if (myRole === 'blue') displayScoreBlue += tempScore;
                else displayScoreRed += tempScore;
                
                if (myRole === 'blue' && tempLogs.length) displayLogsBlue = [...displayLogsBlue, ...tempLogs];
                if (myRole === 'red' && tempLogs.length) displayLogsRed = [...displayLogsRed, ...tempLogs];
            } else if (gameState.liveState) {
                displayBoard = gameState.liveState.board || gameState.board;
                displaySelected = gameState.liveState.selected;
                isLiveOpponent = true;
                
                if (gameState.turn === 'blue') displayScoreBlue += gameState.liveState.score || 0;
                else displayScoreRed += gameState.liveState.score || 0;
                
                if (gameState.turn === 'blue' && gameState.liveState.logs) displayLogsBlue = [...displayLogsBlue, ...gameState.liveState.logs];
                if (gameState.turn === 'red' && gameState.liveState.logs) displayLogsRed = [...displayLogsRed, ...gameState.liveState.logs];
            }

            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    
                    const isPlayable = (r + c) % 2 === 0;
                    sq.className = `square ${isPlayable ? 'light' : 'dark'}`;
                    
                    const op = boardOps[r][c];
                    if (op && isPlayable) {
                        sq.innerHTML = `<span class="operator">${op}</span>`;
                    }

                    const p = displayBoard[r][c];
                    if (p) {
                        const pEl = document.createElement('div');
                        let underline = (p.val === 6 || p.val === 9 || p.val === -6 || p.val === -9) ? 'underline underline-offset-4' : '';
                        pEl.className = `piece ${p.color} ${underline} ${p.dama ? 'ring-[4px] ring-yellow-400 ring-offset-2 ring-offset-[#f1f5f9]' : ''}`;
                        
                        if (displaySelected && displaySelected.r === r && displaySelected.c === c) {
                            pEl.classList.add('selected');
                            if (isLiveOpponent) pEl.classList.add('animate-pulse');
                        }
                        
                        pEl.innerText = p.val;
                        pEl.onclick = () => handlePieceClick(r, c);
                        sq.appendChild(pEl);
                    }

                    if (gameState.turn === myRole && !isCommitting) {
                        const isMove = moves.some(m => m.r === r && m.c === c);
                        if (isMove) {
                            sq.classList.add('valid-move', 'cursor-pointer');
                            sq.onclick = () => executeMove(r, c);
                        }
                    }
                    boardEl.appendChild(sq);
                }
            }

            // Real-time floating point scores
            document.getElementById('score-blue').innerText = displayScoreBlue % 1 === 0 ? displayScoreBlue : displayScoreBlue.toFixed(2);
            document.getElementById('score-red').innerText = displayScoreRed % 1 === 0 ? displayScoreRed : displayScoreRed.toFixed(2);
            
            // Match Wins
            document.getElementById('match-wins-blue').innerText = `WINS: ${gameState.matchWins.blue || 0}`;
            document.getElementById('match-wins-red').innerText = `WINS: ${gameState.matchWins.red || 0}`;

            document.getElementById('panel-blue').classList.toggle('active-turn', gameState.turn === 'blue');
            document.getElementById('panel-red').classList.toggle('active-turn', gameState.turn === 'red');
            
            const logBlueEl = document.getElementById('log-blue');
            if (logBlueEl) {
                logBlueEl.innerHTML = displayLogsBlue.map(item => `<div class="history-item">${item}</div>`).join('');
                logBlueEl.scrollTop = logBlueEl.scrollHeight;
            }
            const logRedEl = document.getElementById('log-red');
            if (logRedEl) {
                logRedEl.innerHTML = displayLogsRed.map(item => `<div class="history-item">${item}</div>`).join('');
                logRedEl.scrollTop = logRedEl.scrollHeight;
            }

            // Connection Indicator Logic
            const oppStatusEl = document.getElementById('opponent-status');
            if (oppStatusEl) {
                oppStatusEl.classList.remove('hidden');
                if (!gameState.players.red) {
                    oppStatusEl.innerText = "⏳ WAITING FOR OPPONENT";
                    oppStatusEl.className = "mt-2 text-[9px] px-2 py-0.5 rounded uppercase font-bold tracking-widest bg-orange-900/50 text-orange-400 border border-orange-700/50 animate-pulse";
                } else {
                    oppStatusEl.innerText = "🟢 BOTH PLAYERS CONNECTED";
                    oppStatusEl.className = "mt-2 text-[9px] px-2 py-0.5 rounded uppercase font-bold tracking-widest bg-green-900/50 text-green-400 border border-green-700/50";
                }
            }

            const status = document.getElementById('turn-status');
            if (!gameState.players.red) {
                status.innerText = "WAITING FOR PLAYER 2 TO JOIN...";
                status.className = "font-bold text-orange-400 italic animate-pulse";
                document.getElementById('actions').classList.add('hidden');
            } else if (myRole === 'observer') {
                status.innerText = `OBSERVING: ${gameState.turn.toUpperCase()}'S TURN`;
                status.className = "font-bold text-slate-400 italic";
                document.getElementById('actions').classList.add('hidden');
            } else if (gameState.turn === myRole) {
                status.innerText = jumpChain ? "JUMP REQUIRED!" : (turnBoard ? "CONFIRM TURN" : "YOUR MOVE");
                status.className = "font-black text-xl text-green-400 animate-pulse uppercase";
                document.getElementById('actions').classList.toggle('hidden', !turnBoard);
            } else {
                status.innerText = isLiveOpponent ? `OPPONENT IS MOVING...` : `WAITING FOR ${gameState.turn.toUpperCase()}`;
                status.className = isLiveOpponent ? "font-bold text-yellow-400 italic animate-pulse" : "font-bold text-slate-500 italic";
                document.getElementById('actions').classList.add('hidden');
            }
        }

        function handlePieceClick(r, c) {
            if (!gameState.players.red) return; 
            if (isCommitting || gameState.turn !== myRole || (turnBoard && !jumpChain)) return; 
            const p = (turnBoard || gameState.board)[r][c];
            if (!p || p.color !== myRole) return;
            if (jumpChain && (selected.r !== r || selected.c !== c)) return;

            selected = { r, c };
            moves = getAvailableMoves(r, c, turnBoard || gameState.board, jumpChain);
            
            pushLiveState(); 
            render();
        }

        function executeMove(tr, tc) {
            if (isCommitting) return; 
            const move = moves.find(m => m.r === tr && m.c === tc);
            if (!move) return;

            if (!turnBoard) turnBoard = JSON.parse(JSON.stringify(gameState.board));
            const p = turnBoard[selected.r][selected.c];
            
            if (move.cap) {
                const victim = turnBoard[move.cap.r][move.cap.c];
                const op = boardOps[tr][tc] || '+';
                let rawPts = 0;
                const v1 = p.val;
                const v2 = victim.val;
                
                if (op === '+') rawPts = v1 + v2;
                else if (op === '-') rawPts = v1 - v2;
                else if (op === '×') rawPts = v1 * v2;
                else if (op === '÷') rawPts = v2 !== 0 ? v1 / v2 : v1;
                
                if (p.dama) rawPts *= 2;
                tempScore += rawPts;
                
                const formattedPts = rawPts % 1 === 0 ? rawPts : rawPts.toFixed(2);
                const damaPrefix = p.dama ? '2 × ' : '';
                tempLogs.push(`${damaPrefix}(${v1} ${op} ${v2}) = ${formattedPts}`);

                turnBoard[move.cap.r][move.cap.c] = null;
            }

            turnBoard[tr][tc] = p;
            turnBoard[selected.r][selected.c] = null;
            selected = { r: tr, c: tc };

            const nextJumps = getAvailableMoves(tr, tc, turnBoard, true);
            if (nextJumps.length > 0 && move.cap) {
                jumpChain = true;
                moves = nextJumps;
            } else {
                jumpChain = false;
                moves = [];
                if ((myRole === 'blue' && tr === 0) || (myRole === 'red' && tr === 7)) p.dama = true;
            }
            
            pushLiveState();
            render();
        }

        function getAvailableMoves(r, c, b, onlyJumps = false) {
            const p = b[r][c];
            const jumps = [];
            const slides = [];
            const allDirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
            const forwardDirs = p.color === 'blue' ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]];

            if (p.dama) {
                allDirs.forEach(([dr, dc]) => {
                    let step = 1;
                    let foundPiece = false;
                    let victim = null;

                    while (true) {
                        const tr = r + dr * step;
                        const tc = c + dc * step;
                        
                        if (tr < 0 || tr >= 8 || tc < 0 || tc >= 8) break;
                        
                        const currentSquare = b[tr][tc];

                        if (!currentSquare) {
                            if (!foundPiece) {
                                slides.push({ r: tr, c: tc });
                            } else {
                                jumps.push({ r: tr, c: tc, cap: victim });
                            }
                        } else {
                            if (!foundPiece && currentSquare.color !== p.color) {
                                foundPiece = true;
                                victim = { r: tr, c: tc };
                            } else {
                                break;
                            }
                        }
                        step++;
                    }
                });
            } else {
                allDirs.forEach(([dr, dc]) => {
                    const mr = r + dr, mc = c + dc;
                    const tr = r + dr*2, tc = c + dc*2;
                    if (tr >= 0 && tr < 8 && tc >= 0 && tc < 8) {
                        const mid = b[mr][mc];
                        if (mid && mid.color !== p.color && !b[tr][tc]) {
                            jumps.push({ r: tr, c: tc, cap: { r: mr, c: mc } });
                        }
                    }
                });

                forwardDirs.forEach(([dr, dc]) => {
                    const tr = r + dr, tc = c + dc;
                    if (tr >= 0 && tr < 8 && tc >= 0 && tc < 8 && !b[tr][tc]) {
                        slides.push({ r: tr, c: tc });
                    }
                });
            }

            if (jumps.length > 0) return jumps;
            if (onlyJumps) return [];
            return slides;
        }

        // Binds
        document.getElementById('btn-create').onclick = () => window.createGame();
        document.getElementById('btn-join').onclick = () => window.joinGame();
        
        // NEW MATCH HANDLING
        window.promptNewGame = () => {
            if (!gameState || myRole !== 'blue') return;
            if (confirm("End this match and start a new one? A winner will be declared based on the current scores.")) {
                triggerNewGame();
            }
        };

        window.triggerNewGame = async () => {
            if (isCommitting || !gameState || myRole !== 'blue') return;
            isCommitting = true;

            const btnNewGame = document.getElementById('btn-new-game');
            btnNewGame.innerText = "STARTING...";
            btnNewGame.classList.add('opacity-50', 'pointer-events-none');

            // Calculate winner
            let winner = 'tie';
            if (gameState.scores.blue > gameState.scores.red) winner = 'blue';
            else if (gameState.scores.red > gameState.scores.blue) winner = 'red';

            // Increment match wins
            const newMatchWins = { 
                blue: (gameState.matchWins?.blue || 0) + (winner === 'blue' ? 1 : 0),
                red: (gameState.matchWins?.red || 0) + (winner === 'red' ? 1 : 0)
            };

            const initialBoard = generateBoard();
            const currentTime = Date.now();

            // OPTIMISTIC UPDATE: Show modal immediately locally before database finishes!
            lastSeenWinnerTime = currentTime; 
            turnBoard = null; selected = null; moves = []; tempScore = 0; tempLogs = []; jumpChain = false;
            showWinnerModal(winner);

            try {
                await updateDoc(getGameRef(roomId), {
                    board: JSON.stringify(initialBoard),
                    turn: 'blue',
                    scores: { blue: 0, red: 0 },
                    history: { blue: [], red: [] },
                    historyStack: "[]",
                    lastAction: currentTime,
                    liveState: null,
                    matchWins: newMatchWins,
                    lastWinner: { role: winner, time: currentTime }
                });
            } catch (e) {
                alert("Network error starting new match.");
            } finally {
                isCommitting = false;
                btnNewGame.innerText = "↻ NEW MATCH";
                btnNewGame.classList.remove('opacity-50', 'pointer-events-none');
            }
        };

        window.showWinnerModal = (winnerRole) => {
            const modal = document.getElementById('winner-modal');
            const nameEl = document.getElementById('winner-name');
            
            if (winnerRole === 'tie') {
                nameEl.innerText = "IT'S A TIE!";
                nameEl.className = "text-4xl font-bold mb-8 text-slate-300 uppercase tracking-widest";
            } else if (winnerRole === 'blue') {
                nameEl.innerText = "BLUE WINS!";
                nameEl.className = "text-4xl font-bold mb-8 text-blue-400 uppercase tracking-widest";
            } else {
                nameEl.innerText = "RED WINS!";
                nameEl.className = "text-4xl font-bold mb-8 text-red-400 uppercase tracking-widest";
            }
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        window.closeWinnerModal = () => {
            const modal = document.getElementById('winner-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        // EXIT HANDLING
        window.promptExit = () => {
            if (!gameState || !user) return location.reload();
            const isHost = gameState.players.blue === user.uid;
            
            const modal = document.getElementById('exit-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            if (isHost) {
                document.getElementById('exit-prompt-text').innerText = "You are the host. Do you want to destroy this room for everyone, or just leave temporarily?";
                document.getElementById('btn-destroy-session').classList.remove('hidden');
            } else {
                document.getElementById('exit-prompt-text').innerText = "Are you sure you want to leave this room?";
                document.getElementById('btn-destroy-session').classList.add('hidden');
            }
        };

        window.closeExitModal = () => {
            const modal = document.getElementById('exit-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        window.leaveSession = () => {
            localStorage.removeItem('last_room'); 
            location.reload();
        };

        window.destroySession = async (isAutoExpire = false) => {
            if (roomId) {
                try {
                    if (unsub) unsub(); 
                    
                    if (!isAutoExpire) {
                        const btn = document.getElementById('btn-destroy-session');
                        if (btn) {
                            btn.innerText = "Destroying Room...";
                            btn.classList.add('opacity-50', 'pointer-events-none');
                        }
                    }

                    await deleteDoc(getGameRef(roomId));
                } catch(e) {
                    console.error("Failed to destroy room:", e);
                }
            }
            localStorage.removeItem('last_room'); 
            location.reload(); 
        };

        window.globalUndo = async () => {
            if (isCommitting || !gameState || !gameState.historyStack || gameState.historyStack.length === 0) return; 
            
            isCommitting = true;
            const btnGlobalUndo = document.getElementById('btn-global-undo');
            btnGlobalUndo.innerText = "REVERTING...";
            btnGlobalUndo.classList.add('opacity-50', 'pointer-events-none');

            const stack = [...gameState.historyStack];
            const prevState = stack.pop();

            try {
                await updateDoc(getGameRef(roomId), {
                    board: JSON.stringify(prevState.board),
                    turn: prevState.turn,
                    scores: prevState.scores,
                    history: prevState.history,
                    historyStack: JSON.stringify(stack),
                    lastAction: Date.now(),
                    liveState: null
                });
                
                turnBoard = null; selected = null; moves = []; tempScore = 0; tempLogs = []; jumpChain = false;
            } catch (e) {
                console.error("Global undo failed", e);
                alert("Network error reverting turn. Please try again.");
            } finally {
                isCommitting = false;
                btnGlobalUndo.innerText = "↶ REVERT LAST TURN";
                btnGlobalUndo.classList.remove('opacity-50', 'pointer-events-none');
                render();
            }
        };
        document.getElementById('btn-global-undo').onclick = window.globalUndo;

        window.undoLocal = () => {
            if (isCommitting || !gameState || gameState.turn !== myRole) return; 
            turnBoard = null; selected = null; moves = []; tempScore = 0; tempLogs = []; jumpChain = false;
            pushLiveState(); 
            render();
        };
        document.getElementById('btn-undo').onclick = window.undoLocal;

        window.commitTurn = async () => {
            if (isCommitting || !gameState || gameState.turn !== myRole) return; 
            
            // ACTIVATE STATE LOCK: Disables local buttons instantly
            isCommitting = true;
            
            const btnCommit = document.getElementById('btn-commit');
            const btnUndo = document.getElementById('btn-undo');
            btnCommit.innerText = "SAVING...";
            btnCommit.classList.add('opacity-50', 'pointer-events-none');
            btnUndo.classList.add('opacity-50', 'pointer-events-none');

            const nextTurn = gameState.turn === 'blue' ? 'red' : 'blue';
            const newScores = { ...gameState.scores };
            newScores[myRole] += tempScore;
            
            const newHistory = { 
                blue: [...(gameState.history.blue || [])], 
                red: [...(gameState.history.red || [])] 
            };

            if (tempLogs.length > 0) newHistory[myRole].push(...tempLogs);
            
            const finalBoard = turnBoard || gameState.board;
            
            let stack = gameState.historyStack || [];
            stack.push({
                board: gameState.board,
                turn: gameState.turn,
                scores: gameState.scores,
                history: gameState.history
            });
            if (stack.length > 20) stack.shift(); // Keeps the last 20 turns
            
            try {
                await updateDoc(getGameRef(roomId), {
                    board: JSON.stringify(finalBoard),
                    turn: nextTurn,
                    scores: newScores,
                    history: newHistory,
                    historyStack: JSON.stringify(stack),
                    lastAction: Date.now(),
                    liveState: null // Wipes ghost view perfectly
                });

            } catch (e) {
                console.error("End turn failed", e);
                alert("Network error ending turn. Please try again.");
                
                isCommitting = false;
                btnCommit.innerText = "END TURN";
                btnCommit.classList.remove('opacity-50', 'pointer-events-none');
                btnUndo.classList.remove('opacity-50', 'pointer-events-none');
                render();
            }
        };
        document.getElementById('btn-commit').onclick = window.commitTurn;

    </script>
</body>
